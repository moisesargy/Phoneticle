name: Generate daily puzzles

on:
  schedule:
    # 05:00 UTC every day
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate puzzles.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-puzzles.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add puzzles.json
          if git diff --cached --quiet; then
            echo "No changes to puzzles.json"
          else
            git commit -m "Daily puzzles for $(date -u +%Y-%m-%d)"
            git push
          fi
